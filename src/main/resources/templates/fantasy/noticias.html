<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias – Fantasy ETSIINF</title>
    <link rel="stylesheet" th:href="@{/css/fantasy.css}">
    <link rel="stylesheet" th:href="@{/css/noticias.css}">
</head>
<body>

    <nav class="fantasy-navbar">
        <div class="nav-izquierda">
            <button class="btn-menu" onclick="toggleMenu()">☰</button>
            <span class="logo">🔔 Noticias</span>
        </div>
        <div class="nav-derecha">
            <span id="nav-username" class="nav-username"></span>
        </div>
    </nav>

    <div id="menu-overlay" class="menu-overlay hidden" onclick="toggleMenu()"></div>
    <div id="menu-lateral" class="menu-lateral hidden">
        <div class="menu-header">
            <span id="menu-username"></span>
            <button class="btn-cerrar-menu" onclick="toggleMenu()">✕</button>
        </div>
        <nav class="menu-opciones">
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/fantasy/mis-ligas'">🏆 Mis Ligas</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?seccion=partidos'">📅 Partidos</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/fantasy/precios'">📈 Precio Jugadores</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?perfil=1'">👤 Perfil</a>
            <a class="menu-item active-menu" onclick="toggleMenu()">🔔 Noticias</a>
        </nav>
        <div class="menu-footer">
            <button class="btn-volver-inicio" onclick="window.location.href='/'">← Volver al inicio</button>
            <button class="btn-cerrar-sesion-menu" onclick="cerrarSesionCompleta()">Cerrar sesión</button>
        </div>
    </div>

    <main class="noticias-contenido">
        <div id="lista-noticias">
            <div class="cargando-ligas">Cargando noticias...</div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="bottom-nav-item" onclick="irAClasificacion()">🏆 Clasificación</button>
        <button class="bottom-nav-item" onclick="irAPlantilla()">👤 Mi Plantilla</button>
        <button class="bottom-nav-item" onclick="irAMercado()">📈 Mercado</button>
        <button class="bottom-nav-item active">🔔 Noticias</button>
    </nav>

    <script th:src="@{/js/sesion.js}"></script>
    <script th:src="@{/js/fantasy-navbar.js}"></script>
    <script th:src="@{/js/noticias.js}"></script>
</body>
</html>
