<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado – Fantasy ETSIINF</title>
    <link rel="stylesheet" th:href="@{/css/fantasy.css}">
    <link rel="stylesheet" th:href="@{/css/plantilla.css}">
    <link rel="stylesheet" th:href="@{/css/mercado.css}">
</head>
<body>

    <nav class="fantasy-navbar">
        <div class="nav-izquierda">
            <button class="btn-menu" onclick="toggleMenu()">☰</button>
            <span class="logo">📈 Mercado</span>
        </div>
        <div class="nav-derecha">
            <span id="nav-username" class="nav-username"></span>
        </div>
    </nav>

    <div id="menu-overlay" class="menu-overlay hidden" onclick="toggleMenu()"></div>
    <div id="menu-lateral" class="menu-lateral hidden">
        <div class="menu-header">
            <span id="menu-username"></span>
            <button class="btn-cerrar-menu" onclick="toggleMenu()">✕</button>
        </div>
        <nav class="menu-opciones">
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/fantasy/mis-ligas'">🏆 Mis Ligas</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?seccion=partidos'">📅 Partidos</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/fantasy/precios'">📈 Precio Jugadores</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?perfil=1'">👤 Perfil</a>
        </nav>
        <div class="menu-footer">
            <button class="btn-volver-inicio" onclick="window.location.href='/'">← Volver al inicio</button>
            <button class="btn-cerrar-sesion-menu" onclick="cerrarSesionCompleta()">Cerrar sesión</button>
        </div>
    </div>

    <!-- TABS MERCADO -->
    <div class="plantilla-tabs">
        <button class="tab-btn active" id="tab-mercado" onclick="cambiarTab('mercado')">Mercado</button>
        <button class="tab-btn" id="tab-operaciones" onclick="cambiarTab('operaciones')">Mis Operaciones</button>
        <button class="tab-btn" id="tab-buscar" onclick="cambiarTab('buscar')">Buscar jugadores</button>
    </div>

    <main class="plantilla-contenido">

        <!-- TAB MERCADO -->
        <div id="seccion-mercado" class="tab-seccion">
            <!-- Saldo disponible -->
            <div class="saldo-mercado" id="saldo-mercado-info">
                <div class="saldo-mercado-principal">
                    <span class="saldo-label">💰 Saldo disponible</span>
                    <span class="saldo-valor" id="saldo-disponible">—</span>
                </div>
                <div class="saldo-mercado-tras-pujas hidden" id="saldo-tras-pujas-container">
                    <span class="saldo-label-small" id="saldo-label-pujas">Pujas activas: —</span>
                    <span class="saldo-valor-small" id="saldo-tras-pujas">—</span>
                    <span class="saldo-label-small">Saldo si ganas todo:</span>
                    <span class="saldo-valor-small" id="saldo-final-pujas">—</span>
                </div>
            </div>

            <!-- Contador del mercado -->
            <div class="contador-mercado">
                <span class="contador-label">⏱ Cierre del mercado en:</span>
                <span class="contador-valor" id="contador-mercado">--:--:--</span>
            </div>

            <div id="lista-mercado" class="lista-plantilla">
                <div class="cargando-ligas">Cargando mercado...</div>
            </div>
        </div>

        <!-- TAB MIS OPERACIONES -->
        <div id="seccion-operaciones" class="tab-seccion hidden">
            <div class="operaciones-tabs">
                <button class="op-tab active" id="op-compras" onclick="cambiarOpTab('compras')">Compras</button>
                <button class="op-tab" id="op-ventas" onclick="cambiarOpTab('ventas')">Ventas</button>
            </div>

            <div id="seccion-compras" class="op-seccion">
                <div id="lista-compras" class="lista-plantilla">
                    <div class="cargando-ligas">Cargando pujas...</div>
                </div>
            </div>

            <div id="seccion-ventas" class="op-seccion hidden">
                <div id="lista-ventas" class="lista-plantilla">
                    <div class="cargando-ligas">Cargando ventas...</div>
                </div>
            </div>
        </div>

        <!--TABBUSCAR JUGADORES-->
        <div id="seccion-buscar" class="tab-seccion hidden">
            <div class="buscar-toolbar">
                <div class="buscar-input-wrap">
                    <span>🔍</span>
                    <input type="text" id="buscar-nombre" placeholder="Buscar jugador..." oninput="filtrarBusqueda()"/>
                </div>
                <div class="buscar-filtros">
                    <select id="filtro-equipo" onchange="filtrarBusqueda()">
                        <option value="">Todos los equipos</option>
                    </select>
                    <select id="filtro-posicion" onchange="filtrarBusqueda()">
                        <option value="">Todas las posiciones</option>
                        <option value="PORTERO">Portero</option>
                        <option value="DEFENSA">Defensa</option>
                        <option value="MEDIOCENTRO">Mediocentro</option>
                        <option value="DELANTERO">Delantero</option>
                    </select>
                    <select id="filtro-orden" onchange="filtrarBusqueda()">
                        <option value="puntos-desc">Puntos ↓</option>
                        <option value="puntos-asc">Puntos ↑</option>
                        <option value="precio-desc">Precio ↓</option>
                        <option value="precio-asc">Precio ↑</option>
                        <option value="nombre-asc">Nombre A-Z</option>
                        <option value="nombre-desc">Nombre Z-A</option>
                    </select>
                </div>
            </div>
            <div id="lista-busqueda"></div>
        </div>

    </main>

    <!-- MODAL REALIZAR PUJA -->
    <div id="modal-puja" class="modal-overlay hidden">
        <div class="modal">
            <h3>Realizar puja</h3>
            <p class="subtexto" id="puja-jugador-nombre"></p>
            <div class="saldo-disponible">
                💰 Saldo disponible: <strong id="puja-saldo">—</strong>
            </div>
            <div class="campo">
                <label>Valor de mercado</label>
                <span class="valor-mercado-ref" id="puja-valor-mercado">—</span>
            </div>
            <div id="error-puja" class="mensaje-error hidden"></div>
            <div class="campo">
                <label>Cantidad de tu puja (€)</label>
                <input type="text" id="input-puja" placeholder="Ej: 10.000.000"
                       oninput="formatearInputDinero(this)"/>
            </div>
            <div class="modal-botones">
                <button class="btn-primary" onclick="confirmarPuja()">Realizar puja</button>
                <button class="btn-ghost" onclick="cerrarModalPuja()">Cancelar</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="bottom-nav-item" onclick="irAClasificacion()">🏆 Clasificación</button>
        <button class="bottom-nav-item" onclick="irAPlantilla()">👤 Mi Plantilla</button>
        <button class="bottom-nav-item active">📈 Mercado</button>
        <button class="bottom-nav-item" onclick="irANoticias()">🔔 Noticias</button>
    </nav>

    <!-- MODAL DETALLE JUGADOR -->
    <div id="modal-detalle-jugador" class="modal-overlay hidden">
        <div class="modal-detalle">
            <div class="detalle-header">
                <div class="detalle-foto"><span id="detalle-icono">👤</span></div>
                <div class="detalle-header-info">
                    <div class="detalle-top">
                        <span class="badge-equipo" id="detalle-equipo"></span>
                        <span class="badge-posicion" id="detalle-posicion-badge"></span>
                        <span id="detalle-nombre" class="detalle-nombre"></span>
                        <span class="detalle-pfsy">PFSY <strong id="detalle-puntos"></strong></span>
                    </div>
                    <div class="detalle-sub">
                        <span>Media <strong id="detalle-media"></strong></span>
                        <span>💰 <strong id="detalle-valor"></strong></span>
                    </div>
                </div>
                <button class="btn-cerrar-detalle" onclick="cerrarDetalleJugador()">✕</button>
            </div>
            <div class="detalle-jornadas-nav">
                <button class="btn-jornada" onclick="cambiarJornadaDetalle(-1)">‹</button>
                <span id="detalle-jornada-label">Jornada —</span>
                <span class="detalle-jornada-pts" id="detalle-jornada-puntos">—</span>
                <button class="btn-jornada" onclick="cambiarJornadaDetalle(1)">›</button>
            </div>
            <div id="detalle-stats-tabla" class="detalle-stats-tabla"></div>
            <button class="btn-ghost" style="width:100%;margin-top:1rem" onclick="cerrarDetalleJugador()">Cerrar</button>
        </div>
    </div>

    <script th:src="@{/js/sesion.js}"></script>
    <script th:src="@{/js/fantasy-navbar.js}"></script>
    <script th:src="@{/js/mercado.js}"></script>
</body>
</html>
