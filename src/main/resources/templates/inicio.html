<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga ETSIINF</title>
    <link rel="stylesheet" th:href="@{/css/inicio.css}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-izquierda">
            <span class="logo">⚽ Liga ETSIINF</span>
            <button class="btn-nav" onclick="irAlFantasy()">Fantasy</button>
            <button class="btn-nav btn-admin hidden" id="btn-gestionar" onclick="window.location.href='/admin'">
                🛠 Gestionar Liga
            </button>
        </div>
        <div class="nav-derecha">
            <span id="saludo-usuario" class="saludo hidden" onclick="abrirMenuPerfil()" style="cursor:pointer"></span>
            <button class="btn-nav btn-sesion" id="btn-sesion" onclick="manejarSesion()">Iniciar sesión</button>
        </div>
    </nav>

    <main class="contenido">
        <div class="hero">
            <h1>Bienvenido a la Liga Interna ETSIINF</h1>
            <p>Consulta clasificaciones, estadísticas y partidos de la liga de fútbol del campus.</p>
        </div>

        <div class="cards-placeholder">
            <div class="card-info">
                <h3>📅 Próximos partidos</h3>
                <p class="proximamente">Próximamente disponible</p>
            </div>
            <div class="card-info">
                <h3>🏆 Clasificación</h3>
                <p class="proximamente">Próximamente disponible</p>
            </div>
            <div class="card-info">
                <h3>📰 Noticias</h3>
                <p class="proximamente">Próximamente disponible</p>
            </div>
        </div>
    </main>

    <div id="modal-perfil" class="modal-overlay hidden">
        <div class="modal-perfil-contenido">
            <button class="btn-cerrar-perfil" onclick="cerrarMenuPerfil()">✕</button>

            <div class="perfil-avatar-seccion">
                <div id="avatar-perfil-grande" class="avatar-perfil-grande">👤</div>
                <label class="btn-cambiar-foto">
                    📷 Cambiar foto
                    <input type="file" accept="image/*" style="display:none" onchange="cambiarFoto(this)">
                </label>
            </div>

            <div class="perfil-info-seccion">
                <h2 id="perfil-nombre-display" class="perfil-nombre-display"></h2>

                <div class="campo">
                    <label>Nombre de usuario</label>
                    <input type="text" id="input-nuevo-username" placeholder="Tu nombre de usuario"/>
                </div>

                <div id="error-perfil" class="mensaje-error hidden"></div>
                <div id="exito-perfil" class="mensaje-exito hidden"></div>

                <button class="btn-primary btn-guardar-perfil" onclick="guardarPerfil()">
                    Guardar cambios
                </button>
            </div>

            <div class="perfil-separador"></div>

            <button class="btn-cerrar-sesion-perfil" onclick="cerrarSesionCompleta()">
                🚪 Cerrar sesión
            </button>
        </div>
    </div>

    <script th:src="@{/js/sesion.js}"></script>
    <script th:src="@{/js/inicio.js}"></script>
</body>
</html>
