<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio Jugadores – Fantasy ETSIINF</title>
    <link rel="stylesheet" th:href="@{/css/fantasy.css}">
    <link rel="stylesheet" th:href="@{/css/plantilla.css}">
    <link rel="stylesheet" th:href="@{/css/precios.css}">
</head>
<body>

    <nav class="fantasy-navbar">
        <div class="nav-izquierda">
            <button class="btn-menu" onclick="toggleMenu()">☰</button>
            <span class="logo">📈 Precio Jugadores</span>
        </div>
        <div class="nav-derecha">
            <span id="nav-username" class="nav-username"></span>
        </div>
    </nav>

    <div id="menu-overlay" class="menu-overlay hidden" onclick="toggleMenu()"></div>
    <div id="menu-lateral" class="menu-lateral hidden">
        <div class="menu-header">
            <span id="menu-username"></span>
            <button class="btn-cerrar-menu" onclick="toggleMenu()">✕</button>
        </div>
        <nav class="menu-opciones">
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/fantasy/mis-ligas'">🏆 Mis Ligas</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?seccion=partidos'">📅 Partidos</a>
            <a class="menu-item active-menu" onclick="toggleMenu()">📈 Precio Jugadores</a>
            <a class="menu-item" onclick="toggleMenu(); window.location.href='/?perfil=1'">👤 Perfil</a>
        </nav>
        <div class="menu-footer">
            <button class="btn-volver-inicio" onclick="window.location.href='/'">← Volver al inicio</button>
            <button class="btn-cerrar-sesion-menu" onclick="cerrarSesionCompleta()">Cerrar sesión</button>
        </div>
    </div>

    <div class="plantilla-tabs">
        <button class="tab-btn active" id="tab-subidas" onclick="cambiarTab('subidas')">
            🟢 Mayores subidas
        </button>
        <button class="tab-btn" id="tab-bajadas" onclick="cambiarTab('bajadas')">
            🔴 Mayores bajadas
        </button>
    </div>

    <div class="periodo-selector">
        <button class="btn-periodo active" id="periodo-semana" onclick="cambiarPeriodo('semana')">Últimos 7 días</button>
        <button class="btn-periodo" id="periodo-dia"    onclick="cambiarPeriodo('dia')">Último día</button>
        <button class="btn-periodo" id="periodo-mes"    onclick="cambiarPeriodo('mes')">Último mes</button>
    </div>

    <main class="precios-contenido">
        <div id="lista-precios">
            <div class="cargando-ligas">Cargando datos...</div>
        </div>
    </main>

    <script th:src="@{/js/sesion.js}"></script>
    <script th:src="@{/js/fantasy-navbar.js}"></script>
    <script th:src="@{/js/precios.js}"></script>
</body>
</html>
